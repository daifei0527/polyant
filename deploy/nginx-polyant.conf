server {
    server_name polyant.dlibrary.cn;
    root /var/www/polyant.dlibrary.cn;
    index index.html;

    access_log /var/log/nginx/polyant.dlibrary.cn.access.log;
    error_log /var/log/nginx/polyant.dlibrary.cn.error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    # SKILL.md alias
    location /skill.md {
        alias /var/www/polyant.dlibrary.cn/SKILL.md;
        default_type text/markdown;
    }

    # 缓存静态资源
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    listen 80;
}
