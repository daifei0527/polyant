name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # R1-E2: 只构建真实存在的二进制（seed/user/pactl，与 Makefile 一致）。
      # 原 release.yml 引用不存在的 ./cmd/polyant 与 ./cmd/awctl，release 一直失败。
      - name: Build for Linux AMD64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64/polyant-seed ./cmd/seed
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64/polyant-user ./cmd/user
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64/pactl ./cmd/pactl
          cp README.md release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64/
          cp SKILL.md release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64/ 2>/dev/null || true
          cp -r configs release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64/ 2>/dev/null || true
          cd release && tar -czvf polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz polyant-${{ steps.get_version.outputs.VERSION }}-linux-amd64

      - name: Build for Linux ARM64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          mkdir -p release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64/polyant-seed ./cmd/seed
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64/polyant-user ./cmd/user
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64/pactl ./cmd/pactl
          cp README.md release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64/
          cp SKILL.md release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64/ 2>/dev/null || true
          cp -r configs release/polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64/ 2>/dev/null || true
          cd release && tar -czvf polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64.tar.gz polyant-${{ steps.get_version.outputs.VERSION }}-linux-arm64

      - name: Build for macOS AMD64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64/polyant-seed ./cmd/seed
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64/polyant-user ./cmd/user
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64/pactl ./cmd/pactl
          cp README.md release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64/
          cp SKILL.md release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64/ 2>/dev/null || true
          cp -r configs release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64/ 2>/dev/null || true
          cd release && tar -czvf polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64.tar.gz polyant-${{ steps.get_version.outputs.VERSION }}-darwin-amd64

      - name: Build for macOS ARM64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          mkdir -p release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64/polyant-seed ./cmd/seed
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64/polyant-user ./cmd/user
          go build -ldflags="-s -w" -o release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64/pactl ./cmd/pactl
          cp README.md release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64/
          cp SKILL.md release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64/ 2>/dev/null || true
          cp -r configs release/polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64/ 2>/dev/null || true
          cd release && tar -czvf polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64.tar.gz polyant-${{ steps.get_version.outputs.VERSION }}-darwin-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
