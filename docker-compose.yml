version: '3.8'

services:
  agentwiki:
    build: .
    container_name: agentwiki
    restart: unless-stopped
    ports:
      - "8080:8080"  # HTTP API
      - "9000:9000"  # P2P Sync
    volumes:
      - agentwiki-data:/app/data
      - agentwiki-config:/app/config
    environment:
      - AGENTWIKI_DATA_DIR=/app/data
      - AGENTWIKI_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  agentwiki-data:
  agentwiki-config:
