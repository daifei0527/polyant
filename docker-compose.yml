version: '3.8'

services:
  polyant:
    build: .
    container_name: polyant
    restart: unless-stopped
    ports:
      - "8080:8080"  # HTTP API
      - "9000:9000"  # P2P Sync
    volumes:
      - polyant-data:/app/data
      - polyant-config:/app/config
    environment:
      - POLYANT_DATA_DIR=/app/data
      - POLYANT_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  polyant-data:
  polyant-config:
