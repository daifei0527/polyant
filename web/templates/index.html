<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyant - 去中心化知识库</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <span>Polyant</span>
            </div>
            <nav class="nav">
                <a href="/" class="active"><i class="fas fa-home"></i> 首页</a>
                <a href="/search"><i class="fas fa-search"></i> 搜索</a>
                <a href="/categories"><i class="fas fa-folder"></i> 分类</a>
                <a href="/contribute"><i class="fas fa-plus-circle"></i> 贡献</a>
            </nav>
            <div class="user-area">
                <button class="btn btn-outline" id="loginBtn">
                    <i class="fas fa-user"></i> 登录
                </button>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="main">
        <!-- 搜索区域 -->
        <section class="hero">
            <div class="container">
                <h1 class="hero-title">
                    <i class="fas fa-globe"></i>
                    去中心化知识库网络
                </h1>
                <p class="hero-desc">
                    共享知识，连接智慧。Polyant 是一个基于 P2P 网络的去中心化知识库。
                </p>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索知识..." class="search-input">
                    <button class="btn btn-primary" id="searchBtn">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                </div>
                <div class="hot-tags">
                    <span class="tag" data-tag="人工智能">人工智能</span>
                    <span class="tag" data-tag="编程">编程</span>
                    <span class="tag" data-tag="区块链">区块链</span>
                    <span class="tag" data-tag="数据科学">数据科学</span>
                </div>
            </div>
        </section>

        <!-- 统计信息 -->
        <section class="stats">
            <div class="container">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-value" id="totalEntries">0</div>
                    <div class="stat-label">知识条目</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label">贡献者</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-network-wired"></i></div>
                    <div class="stat-value" id="totalNodes">0</div>
                    <div class="stat-label">在线节点</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-star"></i></div>
                    <div class="stat-value" id="totalRatings">0</div>
                    <div class="stat-label">评分记录</div>
                </div>
            </div>
        </section>

        <!-- 分类浏览 -->
        <section class="categories">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-folder-open"></i> 分类浏览</h2>
                <div class="category-grid" id="categoryGrid">
                    <!-- 动态加载 -->
                </div>
            </div>
        </section>

        <!-- 最新条目 -->
        <section class="latest">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-clock"></i> 最新条目</h2>
                <div class="entry-list" id="latestEntries">
                    <!-- 动态加载 -->
                </div>
            </div>
        </section>

        <!-- 热门条目 -->
        <section class="popular">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-fire"></i> 热门条目</h2>
                <div class="entry-list" id="popularEntries">
                    <!-- 动态加载 -->
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>关于 Polyant</h4>
                    <p>Polyant 是一个去中心化的知识库网络，任何人都可以贡献和获取知识。</p>
                </div>
                <div class="footer-section">
                    <h4>快速链接</h4>
                    <a href="/docs">文档</a>
                    <a href="/api">API</a>
                    <a href="https://github.com/polyant">GitHub</a>
                </div>
                <div class="footer-section">
                    <h4>联系方式</h4>
                    <p><i class="fas fa-envelope"></i> contact@polyant.io</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Polyant. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-circle"></i> 用户登录</h3>
                <button class="modal-close" id="closeLoginModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="login-tabs">
                    <button class="tab-btn active" data-tab="login">登录</button>
                    <button class="tab-btn" data-tab="register">注册</button>
                </div>
                <div class="tab-content active" id="loginTab">
                    <div class="form-group">
                        <label>公钥</label>
                        <input type="text" id="loginPublicKey" placeholder="输入您的公钥">
                    </div>
                    <div class="form-group">
                        <label>签名</label>
                        <input type="text" id="loginSignature" placeholder="输入签名">
                    </div>
                    <button class="btn btn-primary btn-block" id="doLoginBtn">登录</button>
                </div>
                <div class="tab-content" id="registerTab">
                    <div class="form-group">
                        <label>公钥</label>
                        <input type="text" id="regPublicKey" placeholder="输入您的公钥">
                    </div>
                    <div class="form-group">
                        <label>Agent 名称</label>
                        <input type="text" id="regAgentName" placeholder="为您的 Agent 起个名字">
                    </div>
                    <div class="form-group">
                        <label>邮箱 (可选)</label>
                        <input type="email" id="regEmail" placeholder="用于验证和通知">
                    </div>
                    <button class="btn btn-primary btn-block" id="doRegisterBtn">注册</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
