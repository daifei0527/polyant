run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable-all: true
  enable:
    - gofmt
    - goimports
    - misspell
    - ineffassign
    - govet
    - gosec
    - staticcheck
    - unused
    - errcheck
    # R4a 清理后启用（2026-07-06）。gosec/staticcheck/unused 全仓库已绿；
    # errcheck 非测试代码已全清（_test.go 排除，见 issues.exclude-rules）。
    # 唯一受控 nolint：libp2p EnableAutoRelay SA1019（host.go，行为变更迁移留独立轮）。

issues:
  exclude-rules:
    # Exclude scripts directory
    - path: scripts/
      linters:
        - all
    # 测试代码 errcheck/staticcheck 噪声大、价值低（errcheck ~550、staticcheck ~77 处），
    # 生产代码已全清。gosec/unused/govet/gofmt 仍检查测试文件（全绿）。
    - path: _test\.go
      linters:
        - errcheck
        - staticcheck

  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
