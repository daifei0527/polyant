run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable-all: true
  enable:
    - gofmt
    - goimports
    - misspell
    - ineffassign

issues:
  exclude-rules:
    # Exclude scripts directory
    - path: scripts/
      linters:
        - all

  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
